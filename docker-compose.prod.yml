services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    image: quiz_app:latest
    restart: unless-stopped
    env_file:
      - .env.prod
    depends_on:
      - db
      - redis
    networks:
      - quiz_network

  web:
    image: nginx:stable-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - quiz_network

  db:
    image: mysql:8.0
    restart: unless-stopped
    env_file:
      - .env.prod
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - quiz_network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - quiz_network

volumes:
  db_data:
  redis_data:

networks:
  quiz_network:
    driver: bridge
