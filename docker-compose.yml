services:
  # Nginx Web Server
  nginx:
    image: nginx:latest
    container_name: quiz-nginx
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      php:
        condition: service_healthy
    networks:
      - quiz-network
    environment:
      - NGINX_HOST=localhost
      - NGINX_PORT=80

  # PHP-FPM Service
  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: quiz-php
    volumes:
      - ./:/var/www
      - storage_data:/var/www/storage
      - cache_data:/var/www/bootstrap/cache
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - quiz-network
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-quiz}
      - DB_USERNAME=${DB_USERNAME:-quiz_user}
      - DB_PASSWORD=${DB_PASSWORD:-quiz_password}
      - LARAVEL_ENV=${LARAVEL_ENV:-local}
    command: php-fpm
    healthcheck:
      test: ["CMD", "php", "-v"]
      timeout: 10s
      retries: 3
      interval: 10s

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: quiz-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE:-quiz}
      POSTGRES_USER: ${DB_USERNAME:-quiz_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-quiz_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - quiz-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-quiz_user} -d ${DB_DATABASE:-quiz}"]
      timeout: 20s
      retries: 10
      interval: 5s

volumes:
  postgres_data:
    driver: local
  storage_data:
    driver: local
  cache_data:
    driver: local

networks:
  quiz-network:
    driver: bridge
