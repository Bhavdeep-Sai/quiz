services:
  # Nginx Web Server
  nginx:
    image: nginx:latest
    container_name: quiz-nginx
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      php:
        condition: service_healthy
    networks:
      - quiz-network
    environment:
      - NGINX_HOST=localhost
      - NGINX_PORT=80

  # PHP-FPM Service
  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: quiz-php
    volumes:
      - ./:/var/www
      - storage_data:/var/www/storage
      - cache_data:/var/www/bootstrap/cache
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - quiz-network
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-quiz}
      - DB_USERNAME=${DB_USERNAME:-quiz_user}
      - DB_PASSWORD=${DB_PASSWORD:-quiz_password}
      - LARAVEL_ENV=${LARAVEL_ENV:-local}
    command: php-fpm
    healthcheck:
      test: ["CMD", "php", "-v"]
      timeout: 10s
      retries: 3
      interval: 10s

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: quiz-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-quiz}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_USER: ${DB_USERNAME:-quiz_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-quiz_password}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - quiz-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 5s

volumes:
  mysql_data:
    driver: local
  storage_data:
    driver: local
  cache_data:
    driver: local

networks:
  quiz-network:
    driver: bridge
